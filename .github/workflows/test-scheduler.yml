name: Test Scheduler

on:
  workflow_dispatch:
    inputs:
      time:
        description: "evening / morning"
        required: true
        default: "evening"

jobs:
  test-call:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run scheduler manually
        run: node cron.js ${{ github.event.inputs.time }}
