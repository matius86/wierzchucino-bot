name: WasteBot Scheduler

on:
  schedule:
    - cron: "0 16 * * *"   # 18:00 czasu polskiego → evening
    - cron: "0 4 * * *"    # 06:00 czasu polskiego → morning
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Evening scheduler (18:00 PL)
        if: github.event.schedule == '0 16 * * *'
        run: node cron.js evening

      - name: Morning scheduler (06:00 PL)
        if: github.event.schedule == '0 4 * * *'
        run: node cron.js morning
